# The URL the site will be built for
base_url = "https://viniciusssantos.github.io/myblog/"

# The site title and description; used in templates and feeds
title = "Vinicius' Blog"
description = "Writings, thoughts, and notes by me"

compile_sass = true

build_search_index = false

generate_feeds = true
feed_filenames = ["atom.xml"]

taxonomies = [
  { name = "tags", feed = true },
]

[markdown]
external_links_target_blank = true
bottom_footnotes = true

[markdown.highlighting]
theme = "catppuccin-mocha"
inline_threshold = 100

[extra]
author = "Vinicius"
tagline = "Software engineer and guitar player."
# Socials shown in the footer (label -> url)
socials = [
  { name = "GitHub",   url = "https://github.com/ViniciussSantos" },
  { name = "LinkedIn", url = "https://www.linkedin.com/in/vinicius-santana-santos/" },
]
# Navigation entries (label -> path)
nav = [
  { name = "Home",   url = "/" },
  { name = "Blog",   url = "/blog/" },
  { name = "About",  url = "/about/" },
  { name = "Resume", url = "/resume/" },
]
